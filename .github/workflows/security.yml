name: Security Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run full security scan weekly (Sunday 00:00 UTC)
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  # ── 1. npm audit — dependency vulnerability check ──────────────────────────
  npm-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on critical/high, report moderate)
        run: |
          npm audit --json > npm-audit-report.json || true
          # F-A06-1/F-A06-2: fail on critical/high; print moderate count as a warning
          python3 -c "
          import json, sys
          data = json.load(open('npm-audit-report.json'))
          meta = data.get('metadata', {})
          vulns = meta.get('vulnerabilities', {})
          critical = vulns.get('critical', 0)
          high = vulns.get('high', 0)
          moderate = vulns.get('moderate', 0)
          low = vulns.get('low', 0)
          info = vulns.get('info', 0)
          print(f'Vulnerabilities — critical: {critical}, high: {high}, moderate: {moderate}, low: {low}, info: {info}')
          if moderate > 0:
              print(f'::warning::npm audit found {moderate} moderate vulnerabilities. Review and patch within 30 days per CVE SLA.')
          if critical > 0 or high > 0:
              print(f'::error::npm audit found critical/high vulnerabilities. Patch within 24h (critical) or 7d (high) per CVE SLA.')
              sys.exit(1)
          "

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  # ── 2. CodeQL SAST ─────────────────────────────────────────────────────────
  codeql:
    name: SAST — CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
          output: codeql-results
          upload: true

  # ── 3. Trivy — container image vulnerability scan ──────────────────────────
  trivy-image:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: acreos:scan-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "acreos:scan-${{ github.sha }}"
          format: "sarif"
          output: "trivy-image-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy image scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-image-results.sarif"
          category: trivy-image

  # ── 4. Trivy — filesystem scan (secrets, misconfigurations) ───────────────
  trivy-fs:
    name: Trivy Filesystem & Secret Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"
          scanners: "vuln,secret,misconfig"

      - name: Upload Trivy filesystem results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: trivy-filesystem

  # ── 5. Summary gate ────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [npm-audit, codeql, trivy-image, trivy-fs]
    if: always()

    steps:
      - name: Check all security jobs
        run: |
          NPM_RESULT="${{ needs.npm-audit.result }}"
          CODEQL_RESULT="${{ needs.codeql.result }}"
          TRIVY_IMAGE_RESULT="${{ needs.trivy-image.result }}"
          TRIVY_FS_RESULT="${{ needs.trivy-fs.result }}"

          echo "npm audit:    ${NPM_RESULT}"
          echo "CodeQL:       ${CODEQL_RESULT}"
          echo "Trivy image:  ${TRIVY_IMAGE_RESULT}"
          echo "Trivy fs:     ${TRIVY_FS_RESULT}"

          FAILED=0
          for RESULT in "$NPM_RESULT" "$CODEQL_RESULT" "$TRIVY_IMAGE_RESULT" "$TRIVY_FS_RESULT"; do
            if [ "$RESULT" = "failure" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more security scans found critical vulnerabilities. Review the Security tab and scan artifacts."
            exit 1
          fi

          echo "All security checks passed."
