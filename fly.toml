app = 'acreos'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '5000'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[checks]
  [checks.health]
    port = 5000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health/cached'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
