app = 'acreos'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '5000'

[http_service]
  internal_port = 5000
  force_https = true
  # Task #116: Never auto-stop in production — keep 2 machines warm at all times
  auto_stop_machines = 'off'
  auto_start_machines = true
  # Task #116: Minimum 2 instances for high-availability (no single point of failure)
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    # Task #117: Scale out at 70% concurrency, scale in at 20%
    soft_limit = 200
    hard_limit = 250

[checks]
  [checks.health]
    port = 5000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health/cached'

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 2
