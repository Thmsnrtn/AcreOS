version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: acreos
      POSTGRES_PASSWORD: acreos
      POSTGRES_DB: acreos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acreos"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://acreos:acreos@db:5432/acreos
      PORT: "5000"
      NODE_ENV: production

volumes:
  pgdata:
